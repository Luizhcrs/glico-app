<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Glico — Logar</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="common.css" />
</head>
<body>
  <div class="statusbar">
    <span>12:18</span>
    <div class="right">
      <svg viewBox="0 0 24 24" fill="none"><path d="M2 8L12 2L22 8M2 8V22H22V8M2 8L12 14L22 8" stroke="currentColor" stroke-width="2"/></svg>
      <span>87</span>
    </div>
  </div>

  <div class="screen">
    <div class="header">
      <div class="back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="26" height="26"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <div class="title">Nova medição</div>
      <div></div>
    </div>

    <div class="hero">
      <div class="hero-num-row">
        <div class="hero-num" style="color: var(--accent)">130</div>
        <div class="hero-unit">mg/dL</div>
      </div>
      <div class="pill pill-ok">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M5 12l5 5L20 7"/></svg>
        no alvo
      </div>
    </div>

    <div class="label-up">Contexto</div>
    <div class="chip-row">
      <div class="chip">Jejum</div>
      <div class="chip chip-sel">Pré-refeição</div>
      <div class="chip">Pós-refeição</div>
      <div class="chip">Antes de dormir</div>
      <div class="chip">Exercício</div>
      <div class="chip">Aleatório</div>
    </div>

    <div class="keypad">
      <div class="key">1</div>
      <div class="key">2</div>
      <div class="key">3</div>
      <div class="key">4</div>
      <div class="key">5</div>
      <div class="key">6</div>
      <div class="key">7</div>
      <div class="key">8</div>
      <div class="key">9</div>
      <div class="key key-action">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
      </div>
      <div class="key">0</div>
      <div class="key key-action">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
    </div>
  </div>
</body>
</html>
