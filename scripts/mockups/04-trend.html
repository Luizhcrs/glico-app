<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Glico — Tendência</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="common.css" />
</head>
<body>
  <div class="statusbar">
    <span>10:08</span>
    <div class="right">
      <svg viewBox="0 0 24 24" fill="none"><path d="M2 8L12 2L22 8M2 8V22H22V8M2 8L12 14L22 8" stroke="currentColor" stroke-width="2"/></svg>
      <span>74</span>
    </div>
  </div>

  <div class="screen">
    <div class="header">
      <div class="back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="26" height="26"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <div class="title">Tendência</div>
      <div></div>
    </div>

    <div class="tabs">
      <div class="tab">7 dias</div>
      <div class="tab tab-sel">30 dias</div>
      <div class="tab">90 dias</div>
    </div>

    <div class="chart-wrap">
      <svg viewBox="0 0 320 200" preserveAspectRatio="none" style="width: 100%; height: 100%;">
        <!-- target band 70-180 visualizado como faixa verde -->
        <rect x="0" y="40" width="320" height="100" fill="#5a7a5a" opacity="0.12" rx="6"/>
        <line x1="0" y1="40" x2="320" y2="40" stroke="#d8d4c8" stroke-width="0.5" stroke-dasharray="3"/>
        <line x1="0" y1="140" x2="320" y2="140" stroke="#d8d4c8" stroke-width="0.5" stroke-dasharray="3"/>
        <!-- linha de glicemia -->
        <polyline points="0,90 18,75 36,110 54,80 72,55 90,95 108,130 126,100 144,75 162,60 180,90 198,115 216,85 234,65 252,100 270,135 288,95 306,75 320,80"
          stroke="#5a7a5a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- pontos -->
        <circle cx="90" cy="95" r="3" fill="#5a7a5a"/>
        <circle cx="126" cy="100" r="3" fill="#5a7a5a"/>
        <circle cx="162" cy="60" r="3" fill="#5a7a5a"/>
        <circle cx="216" cy="85" r="3" fill="#5a7a5a"/>
        <circle cx="270" cy="135" r="3" fill="#5a7a5a"/>
        <!-- ponto vermelho hipo -->
        <circle cx="234" cy="160" r="3" fill="#b22222"/>
        <text x="6" y="190" font-size="10" fill="#6b7a6b">00</text>
        <text x="306" y="190" font-size="10" fill="#6b7a6b">31</text>
      </svg>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-num">68%</div>
        <div class="stat-lbl">TIR</div>
      </div>
      <div class="stat">
        <div class="stat-num">142</div>
        <div class="stat-lbl">Média</div>
      </div>
      <div class="stat">
        <div class="stat-num">3</div>
        <div class="stat-lbl">Hipos</div>
      </div>
    </div>

    <div class="section">Por janela do dia</div>
    <div class="list">
      <div class="row">
        <div class="meta">
          <div class="time">Manhã (06–12)</div>
        </div>
        <div class="value value-ok" style="font-size: 13px;">128 mg/dL</div>
      </div>
      <div class="row">
        <div class="meta">
          <div class="time">Tarde (12–18)</div>
        </div>
        <div class="value value-ok" style="font-size: 13px;">156 mg/dL</div>
      </div>
      <div class="row">
        <div class="meta">
          <div class="time">Noite (18–24)</div>
        </div>
        <div class="value value-ok" style="font-size: 13px;">144 mg/dL</div>
      </div>
      <div class="row">
        <div class="meta">
          <div class="time">Madrugada (00–06)</div>
        </div>
        <div class="value value-ok" style="font-size: 13px;">—</div>
      </div>
    </div>
  </div>
</body>
</html>
