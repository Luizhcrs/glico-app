<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Glico — Home</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="common.css" />
</head>
<body>
  <div class="statusbar">
    <span>09:42</span>
    <div class="right">
      <svg viewBox="0 0 24 24" fill="none"><path d="M2 8L12 2L22 8M2 8V22H22V8M2 8L12 14L22 8" stroke="currentColor" stroke-width="2"/></svg>
      <span>89</span>
    </div>
  </div>

  <div class="screen">
    <div class="header">
      <div></div>
      <div></div>
      <div class="right-action">Perfil</div>
    </div>

    <div class="greet">Bom dia,</div>
    <div class="greet-name">Olá</div>

    <div class="hero">
      <div class="hero-label">Última medição · há 2 horas</div>
      <div class="hero-num-row">
        <div class="hero-num" style="color: var(--accent)">142</div>
        <div class="hero-unit">mg/dL</div>
      </div>
      <div class="pill-row">
        <div class="pill pill-ok">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M5 12l5 5L20 7"/></svg>
          no alvo
        </div>
        <div class="trend">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><polyline points="3 17 9 11 13 15 21 7"/><polyline points="14 7 21 7 21 14"/></svg>
          +12
        </div>
      </div>
    </div>

    <div class="actions">
      <div class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>
        Medir
      </div>
      <div class="btn btn-danger">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Hipo
      </div>
    </div>
    <div class="btn btn-ghost" style="margin-bottom: 8px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 2l4 4-3 3-4-4z"/><path d="M19 9L8.7 19.3c-1 1-2.5 1-3.4 0l-.6-.6c-1-1-1-2.5 0-3.4L15 5"/></svg>
      Insulina
    </div>
    <div class="link-row">
      <div class="label">Ver tendência</div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="9 18 15 12 9 6"/></svg>
    </div>

    <div class="section">Hoje</div>
    <div class="bucket-header">Manhã</div>
    <div class="list" style="margin-bottom: 12px;">
      <div class="row">
        <div class="meta">
          <div class="time">07:30</div>
          <div class="ctx">Jejum</div>
        </div>
        <div class="value value-ok">98</div>
      </div>
    </div>
    <div class="bucket-header">Tarde</div>
    <div class="list">
      <div class="row">
        <div class="meta">
          <div class="time">12:15</div>
          <div class="ctx">Pré-refeição · 4.5u rápida</div>
        </div>
        <div class="value value-ok">130</div>
      </div>
      <div class="row">
        <div class="meta">
          <div class="time">14:40</div>
          <div class="ctx">Pós-refeição · com nota</div>
        </div>
        <div class="value value-high">218</div>
      </div>
    </div>
  </div>
</body>
</html>
