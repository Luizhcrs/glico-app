<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Glico — Perfil</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="common.css" />
<style>
  .avatar-wrap { width: 84px; height: 84px; align-self: center; margin: 8px auto 0; position: relative; }
  .avatar { width: 84px; height: 84px; border-radius: 42px; background: var(--cardBg); display: flex; align-items: center; justify-content: center; font-size: 34px; font-weight: 700; color: var(--accent); }
  .badge { position: absolute; right: -2px; bottom: -2px; width: 28px; height: 28px; border-radius: 14px; background: var(--accent); border: 2px solid var(--bg); display: flex; align-items: center; justify-content: center; }
  .badge svg { width: 14px; height: 14px; color: #fff; }
  .name { text-align: center; font-weight: 700; font-size: 18px; margin-top: 8px; }
  .subtle { text-align: center; color: var(--textMuted); font-size: 11px; margin-top: 2px; }
  .insulin-row { display: flex; gap: 8px; }
  .insulin-card { flex: 1; background: var(--surface); padding: 12px; border-radius: 12px; }
  .insulin-header { display: flex; align-items: center; gap: 6px; }
  .insulin-header svg { width: 14px; height: 14px; color: var(--accent); }
  .insulin-title { font-size: 11px; font-weight: 700; color: var(--textMuted); text-transform: uppercase; letter-spacing: 0.6px; }
  .insulin-avg { font-size: 24px; font-weight: 700; margin-top: 6px; font-feature-settings: "tnum"; }
  .insulin-unit { font-size: 11px; color: var(--textMuted); font-weight: 400; }
  .insulin-sub { font-size: 11px; color: var(--textMuted); margin-top: 4px; }
  .group { background: var(--surface); border-radius: 12px; overflow: hidden; }
  .group-row { display: flex; align-items: center; padding: 12px; border-bottom: 0.5px solid var(--border); }
  .group-row:last-child { border-bottom: none; }
  .group-row svg.icon { width: 18px; height: 18px; color: var(--accent); margin-right: 12px; }
  .group-label { flex: 1; font-size: 13px; font-weight: 500; }
  .group-value { color: var(--accent); font-weight: 600; font-size: 13px; }
  .group-row svg.chev { width: 18px; height: 18px; color: var(--textMuted); margin-left: 8px; }
</style>
</head>
<body>
  <div class="statusbar">
    <span>09:55</span>
    <div class="right">
      <svg viewBox="0 0 24 24" fill="none"><path d="M2 8L12 2L22 8M2 8V22H22V8M2 8L12 14L22 8" stroke="currentColor" stroke-width="2"/></svg>
      <span>82</span>
    </div>
  </div>

  <div class="screen">
    <div class="header">
      <div class="back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="26" height="26"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <div class="title">Perfil</div>
      <div></div>
    </div>

    <div class="avatar-wrap">
      <div class="avatar">L</div>
      <div class="badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </div>
    </div>
    <div class="name">Luiz</div>
    <div class="subtle">T1 desde 2018 · caneta MDI</div>

    <div class="section">Insulina · últimos 7 dias</div>
    <div class="insulin-row">
      <div class="insulin-card">
        <div class="insulin-header">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 2l4 4-3 3-4-4z"/><path d="M19 9L8.7 19.3c-1 1-2.5 1-3.4 0l-.6-.6c-1-1-1-2.5 0-3.4L15 5"/></svg>
          <div class="insulin-title">Lenta</div>
        </div>
        <div class="insulin-avg">18.0 <span class="insulin-unit">U/dia</span></div>
        <div class="insulin-sub">7 doses · Basaglar</div>
      </div>
      <div class="insulin-card">
        <div class="insulin-header">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 2l4 4-3 3-4-4z"/><path d="M19 9L8.7 19.3c-1 1-2.5 1-3.4 0l-.6-.6c-1-1-1-2.5 0-3.4L15 5"/></svg>
          <div class="insulin-title">Rápida</div>
        </div>
        <div class="insulin-avg">14.5 <span class="insulin-unit">U/dia</span></div>
        <div class="insulin-sub">21 doses · Fiasp</div>
      </div>
    </div>

    <div class="section">Alvos</div>
    <div class="group">
      <div class="group-row">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        <div class="group-label">Faixa alvo</div>
        <div class="group-value">70–180 mg/dL</div>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="group-row">
        <div class="group-label">Hipoglicemia</div>
        <div class="group-value">&lt; 70</div>
      </div>
      <div class="group-row">
        <div class="group-label">Hiperglicemia</div>
        <div class="group-value">&gt; 250</div>
      </div>
    </div>

    <div class="section">Lembretes</div>
    <div class="group">
      <div class="group-row">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <div class="group-label">Configurar lembretes</div>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>
  </div>
</body>
</html>
